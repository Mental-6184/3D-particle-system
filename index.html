<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 粒子系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a0f;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#e0e0e0}
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* Sidebar */
#sidebar{
  position:fixed;top:50%;left:24px;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:16px;
  background:rgba(18,18,30,0.75);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);border-radius:20px;
  padding:24px 20px;min-width:180px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
#sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:4px}

/* Template buttons */
.template-grid{display:flex;flex-direction:column;gap:6px}
.tpl-btn{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:10px 14px;color:#ccc;font-size:14px;
  cursor:pointer;transition:all .25s;text-align:left;
  display:flex;align-items:center;gap:10px;
}
.tpl-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.2)}
.tpl-btn.active{background:rgba(100,140,255,0.15);border-color:rgba(100,140,255,0.4);color:#fff}
.tpl-btn .icon{font-size:18px;width:24px;text-align:center}

/* Color picker */
.color-row{display:flex;align-items:center;gap:12px}
.color-row label{font-size:13px;color:rgba(255,255,255,0.5)}
#colorPicker{
  width:40px;height:40px;border:none;border-radius:10px;cursor:pointer;
  background:none;padding:0;
}
#colorPicker::-webkit-color-swatch-wrapper{padding:0}
#colorPicker::-webkit-color-swatch{border:2px solid rgba(255,255,255,0.15);border-radius:8px}

/* Color presets */
.color-presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.color-swatch{
  width:26px;height:26px;border-radius:7px;border:2px solid transparent;
  cursor:pointer;transition:all .2s;
}
.color-swatch:hover{transform:scale(1.15);border-color:rgba(255,255,255,0.3)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.3)}
.rainbow-btn{
  margin-top:6px;background:linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff);
  border:2px solid transparent;border-radius:8px;padding:6px 0;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;text-align:center;
  transition:all .2s;text-shadow:0 1px 3px rgba(0,0,0,0.5);
}
.rainbow-btn:hover{border-color:rgba(255,255,255,0.4);transform:scale(1.03)}
.rainbow-btn.active{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,0.3)}

/* Particle count slider */
.slider-group{display:flex;flex-direction:column;gap:6px}
.slider-group label{font-size:12px;color:rgba(255,255,255,0.4)}
.slider-group input[type=range]{
  -webkit-appearance:none;width:100%;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);outline:none;
}
.slider-group input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#648cff;cursor:pointer;
}

/* Webcam overlay */
#webcam-wrap{
  position:fixed;bottom:24px;right:24px;z-index:10;
  width:200px;height:150px;border-radius:16px;overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  background:#000;
}
#webcam{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#hand-status{
  position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:6px;
  font-size:11px;color:#aaa;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:8px;
}
#hand-dot{width:8px;height:8px;border-radius:50%;background:#ff4444;transition:background .3s}

/* Gesture indicator */
#gesture-bar{
  position:fixed;bottom:24px;right:240px;z-index:10;
  width:200px;
  background:rgba(18,18,30,0.75);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);border-radius:14px;
  padding:14px 16px;
}
#gesture-bar .label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
#gesture-fill-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
#gesture-fill{height:100%;width:50%;background:linear-gradient(90deg,#648cff,#a78bfa);border-radius:3px;transition:width .15s}
#gesture-value{font-size:22px;font-weight:300;color:#fff;margin-top:6px;text-align:center}

/* Direction indicator */
#dir-indicator{
  position:fixed;bottom:110px;right:300px;z-index:10;
  width:100px;height:100px;
  background:rgba(18,18,30,0.65);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
#dir-dot{
  width:12px;height:12px;border-radius:50%;background:#648cff;
  transition:transform .08s,background .2s;box-shadow:0 0 10px rgba(100,140,255,0.5);
}
#dir-label{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,0.4);white-space:nowrap;
}

/* Title */
#title{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10;
  font-size:15px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);pointer-events:none;
}

/* Loading overlay */
#loading{
  position:fixed;inset:0;z-index:100;background:#0a0a0f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .6s;
}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#648cff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:rgba(255,255,255,0.4)}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>正在初始化...</p></div>

<div id="title">3D 粒子系统</div>

<div id="canvas-container"></div>

<div id="sidebar">
  <h2>模板</h2>
  <div class="template-grid">
    <button class="tpl-btn active" data-tpl="heart"><span class="icon">&#10084;</span>爱心</button>
    <button class="tpl-btn" data-tpl="flower"><span class="icon">&#127803;</span>花朵</button>
    <button class="tpl-btn" data-tpl="saturn"><span class="icon">&#129680;</span>土星</button>
    <button class="tpl-btn" data-tpl="buddha"><span class="icon">&#9750;</span>佛像</button>
    <button class="tpl-btn" data-tpl="firework"><span class="icon">&#127878;</span>烟花</button>
  </div>

  <h2 style="margin-top:8px">颜色</h2>
  <div class="color-row">
    <input type="color" id="colorPicker" value="#648cff">
    <label id="colorHex">#648cff</label>
  </div>
  <div class="color-presets" id="colorPresets">
    <div class="color-swatch active" data-color="#648cff" style="background:#648cff"></div>
    <div class="color-swatch" data-color="#ff6b9d" style="background:#ff6b9d"></div>
    <div class="color-swatch" data-color="#44ff88" style="background:#44ff88"></div>
    <div class="color-swatch" data-color="#ffaa22" style="background:#ffaa22"></div>
    <div class="color-swatch" data-color="#ff4466" style="background:#ff4466"></div>
    <div class="color-swatch" data-color="#aa66ff" style="background:#aa66ff"></div>
    <div class="color-swatch" data-color="#44eeff" style="background:#44eeff"></div>
    <div class="color-swatch" data-color="#ffffff" style="background:#ffffff"></div>
  </div>
  <button class="rainbow-btn" id="rainbowBtn">🌈 Rainbow</button>

  <h2 style="margin-top:8px">粒子</h2>
  <div class="slider-group">
    <label>数量: <span id="countVal">8000</span></label>
    <input type="range" id="countSlider" min="2000" max="20000" step="1000" value="8000">
  </div>
</div>

<div id="webcam-wrap">
  <video id="webcam" autoplay playsinline></video>
  <div id="hand-status"><div id="hand-dot"></div><span id="hand-label">未检测到手</span></div>
</div>

<div id="gesture-bar">
  <div class="label">手掌张开度</div>
  <div id="gesture-fill-track"><div id="gesture-fill"></div></div>
  <div id="gesture-value">50%</div>
</div>

<div id="dir-indicator">
  <div id="dir-dot"></div>
  <span id="dir-label">idle</span>
</div>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- MediaPipe Hands -->
<script src="https://unpkg.com/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ========== CONFIG ==========
const PARTICLE_COUNT_DEFAULT = 8000;
const LERP_SPEED = 0.1;
const EXPLOSION_STRENGTH = 8;
const TURBULENCE_STRENGTH = 1.2;
const SWIPE_FORCE = 7;      // directional push strength
const SWIPE_DECAY = 0.94;   // how fast swipe velocity fades
const CONTRACT_STRENGTH = 5; // fist contraction pull
const SPIRAL_STRENGTH = 3;  // open-hand spiral twist

// ========== THREE.JS SETUP ==========
let scene, camera, renderer, particles, geometry, material;
let targetPositions, currentPositions;
let particleCount = PARTICLE_COUNT_DEFAULT;
let particleColor = new THREE.Color('#648cff');
let currentTemplate = 'heart';
let handOpenness = 0.5; // 0 = closed, 1 = open
let smoothOpenness = 0.5;
let handDetected = false;
let time = 0;
let rainbowMode = false;

// Gesture direction state
let gestureDir = { x: 0, y: 0 };      // smoothed directional force
let palmHistory = [];                    // recent palm positions
const PALM_HISTORY_LEN = 8;

function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 15);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a0f, 1);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  createParticles(particleCount);
  window.addEventListener('resize', onResize);
}

function createParticles(count) {
  if (particles) {
    scene.remove(particles);
    geometry.dispose();
    material.dispose();
  }

  particleCount = count;
  geometry = new THREE.BufferGeometry();
  currentPositions = new Float32Array(count * 3);
  targetPositions = new Float32Array(count * 3);

  // Initialize random positions
  for (let i = 0; i < count * 3; i++) {
    currentPositions[i] = (Math.random() - 0.5) * 60;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

  // Sizes for each particle
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    sizes[i] = Math.random() * 2.5 + 2.0;
  }
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  // Per-particle hue offset for rainbow mode
  const hues = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    hues[i] = i / count; // 0..1 spread
  }
  geometry.setAttribute('aHue', new THREE.BufferAttribute(hues, 1));

  material = new THREE.ShaderMaterial({
    uniforms: {
      uColor: { value: particleColor },
      uTime: { value: 0 },
      uPixelRatio: { value: renderer.getPixelRatio() },
      uRainbow: { value: rainbowMode ? 1.0 : 0.0 },
    },
    vertexShader: `
      attribute float size;
      attribute float aHue;
      uniform float uTime;
      uniform float uPixelRatio;
      varying float vAlpha;
      varying float vHue;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * uPixelRatio * (20.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
        vAlpha = 0.7 + 0.3 * sin(uTime * 0.4 + position.x * 0.2 + position.y * 0.15);
        vHue = aHue;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      uniform float uRainbow;
      uniform float uTime;
      varying float vAlpha;
      varying float vHue;

      vec3 hsv2rgb(vec3 c) {
        vec3 p = abs(fract(c.xxx + vec3(1.0, 2.0/3.0, 1.0/3.0)) * 6.0 - 3.0);
        return c.z * mix(vec3(1.0), clamp(p - 1.0, 0.0, 1.0), c.y);
      }

      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        // Sharper falloff for clearer shape outline
        float alpha = smoothstep(0.5, 0.25, d) * vAlpha;
        vec3 col = mix(uColor, hsv2rgb(vec3(fract(vHue + uTime * 0.02), 0.8, 1.0)), uRainbow);
        // Subtle bright center
        col += vec3(0.2) * smoothstep(0.25, 0.0, d);
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  generateTemplate(currentTemplate);
}

// ========== TEMPLATES ==========
function generateTemplate(name) {
  currentTemplate = name;
  const count = particleCount;

  for (let i = 0; i < count; i++) {
    let x, y, z;
    const rand = () => (Math.random() - 0.5) * 0.5;

    switch (name) {
      case 'heart': {
        // Parametric heart surface
        const u = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI;
        const r = 1 - Math.sin(v);
        x = 16 * Math.pow(Math.sin(v), 3) * Math.cos(u) * 0.2 + rand() * 1.2;
        y = (13 * Math.cos(v) - 5 * Math.cos(2*v) - 2 * Math.cos(3*v) - Math.cos(4*v)) * 0.2 + rand() * 1.2;
        z = rand() * 3;
        break;
      }
      case 'flower': {
        const k = 5;
        const angle = Math.random() * Math.PI * 2;
        const r2 = Math.cos(k * angle) * 4.5;
        const layer = Math.random();
        x = r2 * Math.cos(angle) * layer + rand() * 0.5;
        y = r2 * Math.sin(angle) * layer + rand() * 0.5;
        z = (Math.random() - 0.5) * 2 + rand() * 0.3;
        break;
      }
      case 'saturn': {
        if (i < count * 0.5) {
          // Sphere core
          const phi = Math.acos(2 * Math.random() - 1);
          const theta = Math.random() * Math.PI * 2;
          const r3 = 3.2;
          x = r3 * Math.sin(phi) * Math.cos(theta) + rand() * 0.35;
          y = r3 * Math.sin(phi) * Math.sin(theta) + rand() * 0.35;
          z = r3 * Math.cos(phi) + rand() * 0.35;
        } else {
          // Ring
          const ringAngle = Math.random() * Math.PI * 2;
          const ringR = 5.5 + Math.random() * 2.5;
          x = ringR * Math.cos(ringAngle);
          y = (Math.random() - 0.5) * 0.45;
          z = ringR * Math.sin(ringAngle);
        }
        break;
      }
      case 'buddha': {
        // Simplified Buddha silhouette: head circle, body triangle, halo ring
        const part = Math.random();
        if (part < 0.35) {
          // Head
          const ha = Math.random() * Math.PI * 2;
          const hr = Math.random() * 2.2;
          x = hr * Math.cos(ha);
          y = 5 + hr * Math.sin(ha);
          z = rand() * 1.5;
        } else if (part < 0.7) {
          // Body (tapered shape)
          const bodyY = Math.random() * 6.5 - 1;
          const bodyW = 2.8 * (1 - (bodyY + 1) / 6.5);
          x = (Math.random() - 0.5) * bodyW * 2;
          y = bodyY;
          z = rand() * 1.5;
        } else if (part < 0.85) {
          // Halo ring
          const haloA = Math.random() * Math.PI * 2;
          const haloR = 4 + Math.random() * 0.5;
          x = haloR * Math.cos(haloA);
          y = 5 + haloR * Math.sin(haloA);
          z = rand() * 0.5;
        } else {
          // Legs / base
          const legA = Math.random() * Math.PI - Math.PI / 2;
          const legR = Math.random() * 3.2;
          x = legR * Math.cos(legA);
          y = -2 + Math.random() * -1.2;
          z = rand() * 2;
        }
        break;
      }
      case 'firework': {
        // Multiple burst centers
        const burstCount = 5;
        const burstIdx = Math.floor(Math.random() * burstCount);
        const burstAngle = (burstIdx / burstCount) * Math.PI * 2;
        const burstDist = 3.5 + Math.random() * 2;
        const bx = burstDist * Math.cos(burstAngle);
        const by = burstDist * Math.sin(burstAngle);
        const bz = (Math.random() - 0.5) * 3;
        // Radial burst from center
        const phi2 = Math.acos(2 * Math.random() - 1);
        const theta2 = Math.random() * Math.PI * 2;
        const burstR = Math.random() * 3;
        x = bx + burstR * Math.sin(phi2) * Math.cos(theta2);
        y = by + burstR * Math.sin(phi2) * Math.sin(theta2);
        z = bz + burstR * Math.cos(phi2);
        break;
      }
    }

    const idx = i * 3;
    targetPositions[idx] = x;
    targetPositions[idx + 1] = y;
    targetPositions[idx + 2] = z;
  }
}

// ========== ANIMATION ==========
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Smooth hand openness (faster response)
  smoothOpenness += (handOpenness - smoothOpenness) * 0.18;

  // Decay directional gesture
  gestureDir.x *= SWIPE_DECAY;
  gestureDir.y *= SWIPE_DECAY;
  if (Math.abs(gestureDir.x) < 0.01) gestureDir.x = 0;
  if (Math.abs(gestureDir.y) < 0.01) gestureDir.y = 0;

  // Update direction indicator UI
  updateDirIndicator();

  // Update particles
  const positions = geometry.attributes.position.array;
  const count = particleCount;

  // Precompute shared values
  const open = smoothOpenness;           // 0=fist, 1=open
  const closed = 1 - open;
  const pulse = Math.sin(time * 1.5) * 0.3 + 0.5; // subtle breathing

  for (let i = 0; i < count; i++) {
    const idx = i * 3;

    // Base target
    let tx = targetPositions[idx];
    let ty = targetPositions[idx + 1];
    let tz = targetPositions[idx + 2];

    const dist = Math.sqrt(tx * tx + ty * ty + tz * tz) || 1;

    // ====== OPEN HAND: explosion + spiral + shockwave ======
    // Explosion: push outward radially
    const explosionFactor = open * EXPLOSION_STRENGTH;
    tx += (tx / dist) * explosionFactor;
    ty += (ty / dist) * explosionFactor;
    tz += (tz / dist) * explosionFactor;

    // Spiral twist: rotate particles around Y axis based on distance
    const spiralAngle = open * SPIRAL_STRENGTH * (1 + pulse * 0.3);
    const cosS = Math.cos(spiralAngle / dist);
    const sinS = Math.sin(spiralAngle / dist);
    const spX = tx * cosS - tz * sinS;
    const spZ = tx * sinS + tz * cosS;
    tx = tx * (1 - open * 0.6) + spX * open * 0.6;
    tz = tz * (1 - open * 0.6) + spZ * open * 0.6;

    // Shockwave ripple: push particles at certain distances outward more
    const waveDist = (dist + time * 3) % 6;
    const waveFactor = Math.exp(-waveDist * waveDist * 0.5) * open * 2;
    tx += (tx / dist) * waveFactor;
    ty += (ty / dist) * waveFactor;
    tz += (tz / dist) * waveFactor;

    // ====== CLOSED FIST: contract + vortex + breathe ======
    // Contraction: pull toward center
    const contractFactor = closed * CONTRACT_STRENGTH;
    tx -= (tx / dist) * contractFactor * (0.5 + pulse * 0.5);
    ty -= (ty / dist) * contractFactor * (0.5 + pulse * 0.5);
    tz -= (tz / dist) * contractFactor * (0.5 + pulse * 0.5);

    // Vortex swirl: rotate particles around Y in opposite direction
    const vortexAngle = closed * 2.5 * (1 + Math.sin(time * 1.5) * 0.3);
    const cosV = Math.cos(vortexAngle / (dist + 1));
    const sinV = Math.sin(vortexAngle / (dist + 1));
    const vX = tx * cosV - tz * sinV;
    const vZ = tx * sinV + tz * cosV;
    tx = tx * (1 - closed * 0.5) + vX * closed * 0.5;
    tz = tz * (1 - closed * 0.5) + vZ * closed * 0.5;

    // Turbulence: chaotic motion when fist is closed
    const turb = closed * TURBULENCE_STRENGTH;
    tx += Math.sin(time * 3.5 + i * 0.17) * turb;
    ty += Math.cos(time * 2.8 + i * 0.23) * turb;
    tz += Math.sin(time * 2.1 + i * 0.11) * turb;

    // ====== DIRECTIONAL SWIPE ======
    tx += gestureDir.x * SWIPE_FORCE;
    ty += gestureDir.y * SWIPE_FORCE;

    // Lerp current to target
    positions[idx] += (tx - positions[idx]) * LERP_SPEED;
    positions[idx + 1] += (ty - positions[idx + 1]) * LERP_SPEED;
    positions[idx + 2] += (tz - positions[idx + 2]) * LERP_SPEED;
  }

  geometry.attributes.position.needsUpdate = true;
  material.uniforms.uTime.value = time;

  // Dynamic rotation speed based on gesture
  particles.rotation.y += 0.002 + open * 0.008 + Math.abs(gestureDir.x) * 0.003;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ========== MEDIAPIPE HANDS ==========
let handsModule, cameraModule;

function initHands() {
  const videoEl = document.getElementById('webcam');

  handsModule = new Hands({
    locateFile: (file) => `https://unpkg.com/@mediapipe/hands@0.4.1675469240/${file}`
  });

  handsModule.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });

  handsModule.onResults(onHandResults);

  cameraModule = new Camera(videoEl, {
    onFrame: async () => {
      await handsModule.send({ image: videoEl });
    },
    width: 320,
    height: 240,
  });

  cameraModule.start().then(() => {
    document.getElementById('loading').classList.add('hidden');
  }).catch(() => {
    // Camera denied - still show app
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('hand-label').textContent = '无摄像头';
  });
}

// Landmark indices for fingertips and palm
const FINGER_TIPS = [4, 8, 12, 16, 20]; // thumb, index, middle, ring, pinky
const PALM_CENTER = 0; // wrist as proxy

function onHandResults(results) {
  const dot = document.getElementById('hand-dot');
  const label = document.getElementById('hand-label');

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handDetected = true;
    dot.style.background = '#44ff88';
    label.textContent = `${results.multiHandLandmarks.length} 只手`;

    // Compute openness from all detected hands
    let totalOpenness = 0;
    for (const landmarks of results.multiHandLandmarks) {
      const palm = landmarks[PALM_CENTER];
      let avgDist = 0;
      for (const tipIdx of FINGER_TIPS) {
        const tip = landmarks[tipIdx];
        const dx = tip.x - palm.x;
        const dy = tip.y - palm.y;
        const dz = (tip.z || 0) - (palm.z || 0);
        avgDist += Math.sqrt(dx*dx + dy*dy + dz*dz);
      }
      avgDist /= FINGER_TIPS.length;
      // Normalize: fist ~0.05, open hand ~0.20 (tighter range = more sensitive)
      const openness = Math.min(1, Math.max(0, (avgDist - 0.04) / 0.15));
      totalOpenness += openness;
    }
    handOpenness = totalOpenness / results.multiHandLandmarks.length;

    // Track palm position for swipe detection
    const palmPos = results.multiHandLandmarks[0][PALM_CENTER];
    palmHistory.push({ x: palmPos.x, y: palmPos.y, t: performance.now() });
    if (palmHistory.length > PALM_HISTORY_LEN) palmHistory.shift();

    // Compute swipe velocity from oldest to newest in history
    if (palmHistory.length >= 3) {
      const oldest = palmHistory[0];
      const newest = palmHistory[palmHistory.length - 1];
      const dt = (newest.t - oldest.t) / 1000; // seconds
      if (dt > 0.03) {
        // MediaPipe x: 0=left, 1=right → invert for screen coords
        const vx = -(newest.x - oldest.x) / dt;
        const vy = (newest.y - oldest.y) / dt;   // y: 0=top, 1=bottom → down is positive
        // Blend into gestureDir (smooth, higher sensitivity)
        const sensitivity = 1.2;
        gestureDir.x += (vx * sensitivity - gestureDir.x) * 0.4;
        gestureDir.y += (vy * sensitivity - gestureDir.y) * 0.4;
        // Clamp
        gestureDir.x = Math.max(-2.5, Math.min(2.5, gestureDir.x));
        gestureDir.y = Math.max(-2.5, Math.min(2.5, gestureDir.y));
      }
    }
  } else {
    handDetected = false;
    dot.style.background = '#ff4444';
    label.textContent = '未检测到手';
    handOpenness = 0.5; // default
    palmHistory = [];
  }

  // Update gesture bar
  updateGestureUI();
}

function updateGestureUI() {
  const pct = Math.round(smoothOpenness * 100);
  document.getElementById('gesture-fill').style.width = pct + '%';
  document.getElementById('gesture-value').textContent = pct + '%';
}

function updateDirIndicator() {
  const dot = document.getElementById('dir-dot');
  const lbl = document.getElementById('dir-label');
  // Map gestureDir (-2.5..2.5) to pixel offset (-35..35)
  const ox = Math.max(-35, Math.min(35, gestureDir.x * 14));
  const oy = Math.max(-35, Math.min(35, gestureDir.y * 14));
  dot.style.transform = `translate(${ox}px, ${oy}px)`;

  // Determine dominant direction label
  const ax = Math.abs(gestureDir.x);
  const ay = Math.abs(gestureDir.y);
  if (ax < 0.08 && ay < 0.08) {
    lbl.textContent = '静止';
    dot.style.background = '#648cff';
  } else if (ax > ay) {
    lbl.textContent = gestureDir.x > 0 ? '→ 向右推' : '← 向左推';
    dot.style.background = gestureDir.x > 0 ? '#44ff88' : '#ff6b9d';
  } else {
    lbl.textContent = gestureDir.y > 0 ? '↓ 向下推' : '↑ 向上推';
    dot.style.background = gestureDir.y > 0 ? '#ffaa22' : '#44eeff';
  }
}

// ========== UI ==========
function setParticleColor(hex) {
  particleColor.set(hex);
  material.uniforms.uColor.value = particleColor;
  document.getElementById('colorPicker').value = hex;
  document.getElementById('colorHex').textContent = hex;
  // Update swatch active state
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === hex);
  });
}

function initUI() {
  // Template buttons
  document.querySelectorAll('.tpl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      generateTemplate(btn.dataset.tpl);
    });
  });

  // Color picker
  const picker = document.getElementById('colorPicker');
  picker.addEventListener('input', (e) => {
    rainbowMode = false;
    document.getElementById('rainbowBtn').classList.remove('active');
    material.uniforms.uRainbow.value = 0.0;
    setParticleColor(e.target.value);
  });

  // Color presets
  document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      rainbowMode = false;
      document.getElementById('rainbowBtn').classList.remove('active');
      material.uniforms.uRainbow.value = 0.0;
      setParticleColor(swatch.dataset.color);
    });
  });

  // Rainbow button
  document.getElementById('rainbowBtn').addEventListener('click', () => {
    rainbowMode = !rainbowMode;
    document.getElementById('rainbowBtn').classList.toggle('active', rainbowMode);
    material.uniforms.uRainbow.value = rainbowMode ? 1.0 : 0.0;
  });

  // Particle count slider
  const slider = document.getElementById('countSlider');
  slider.addEventListener('input', (e) => {
    const count = parseInt(e.target.value);
    document.getElementById('countVal').textContent = count;
  });
  slider.addEventListener('change', (e) => {
    createParticles(parseInt(e.target.value));
  });
}

// ========== INIT ==========
initThree();
initUI();
initHands();
animate();
</script>
